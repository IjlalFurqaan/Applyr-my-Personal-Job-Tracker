# Dev-time Alembic config (autogenerate). At runtime, migrations are applied
# programmatically by jobtrack.core.db.migrate() against the real DB path.
[alembic]
script_location = src/jobtrack/migrations
sqlalchemy.url = sqlite:///.autogen-scratch.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
