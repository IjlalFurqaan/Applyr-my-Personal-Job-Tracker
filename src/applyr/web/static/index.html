<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Applyr</title>
<style>
  :root {
    --bg: #0b0d10; --surface: #14171c; --surface2: #1a1e25; --border: #232830;
    --text: #e6e9ee; --dim: #8a93a3; --accent: #6aa2ff; --green: #3fb27f;
    --red: #e5636c; --amber: #d9a13b; --mono: ui-monospace, "Cascadia Mono", Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.5 system-ui, "Segoe UI", sans-serif;
    display: grid; grid-template-columns: 200px 1fr; min-height: 100vh;
  }
  /* --- sidebar --- */
  nav {
    border-right: 1px solid var(--border); padding: 20px 12px;
    display: flex; flex-direction: column; gap: 4px; position: sticky; top: 0; height: 100vh;
  }
  .brand { font-size: 20px; font-weight: 700; padding: 0 10px 14px; letter-spacing: .3px; }
  .brand span { color: var(--accent); }
  nav a {
    color: var(--dim); text-decoration: none; padding: 8px 10px; border-radius: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  nav a:hover { background: var(--surface); color: var(--text); }
  nav a.active { background: var(--surface2); color: var(--text); font-weight: 600; }
  .badge {
    background: var(--accent); color: #0b0d10; border-radius: 10px; font-size: 11px;
    font-weight: 700; padding: 1px 7px; display: none;
  }
  .nav-foot { margin-top: auto; color: var(--dim); font-size: 11px; padding: 0 10px; }
  /* --- main --- */
  main { padding: 20px 26px 60px; max-width: 1080px; width: 100%; }
  /* --- say bar --- */
  .saybar { display: flex; gap: 8px; margin-bottom: 8px; }
  .saybar input {
    flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 10px 14px; font-size: 14px; outline: none;
  }
  .saybar input:focus { border-color: var(--accent); }
  .saybar button { white-space: nowrap; }
  #say-out { margin-bottom: 16px; }
  /* --- shared --- */
  h2 { font-size: 16px; margin: 18px 0 10px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 12px;
  }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
  .card h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .8px; color: var(--dim); margin-bottom: 8px; }
  .card ul { list-style: none; }
  .card li { padding: 3px 0; }
  .empty { color: var(--dim); font-style: italic; }
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--dim); font-size: 12px; text-transform: uppercase; letter-spacing: .6px; }
  tr.rowlink { cursor: pointer; }
  tr.rowlink:hover td { background: var(--surface2); }
  button {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #0b0d10; font-weight: 600; }
  button.danger:hover { border-color: var(--red); color: var(--red); }
  select, input[type=checkbox] { accent-color: var(--accent); }
  select {
    background: var(--surface); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 8px;
  }
  pre.diff {
    font-family: var(--mono); font-size: 12.5px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
    overflow-x: auto; white-space: pre-wrap; margin: 8px 0;
  }
  .chip {
    display: inline-block; padding: 1px 9px; border-radius: 999px; font-size: 12px;
    font-weight: 600; background: var(--surface2); border: 1px solid var(--border);
  }
  .chip[data-s=saved]        { color: var(--dim); }
  .chip[data-s=applying]     { color: #9db4d8; }
  .chip[data-s=applied]      { color: var(--accent); border-color: #2c4a7c; }
  .chip[data-s=screening]    { color: #58c4d4; border-color: #1f4a52; }
  .chip[data-s=assessment]   { color: #b08fe8; border-color: #43336a; }
  .chip[data-s=interviewing] { color: var(--amber); border-color: #57431c; }
  .chip[data-s=final_round]  { color: #e8935a; border-color: #5c3a1f; }
  .chip[data-s=offer], .chip[data-s=accepted] { color: var(--green); border-color: #1d4d38; }
  .chip[data-s=rejected]     { color: var(--red); border-color: #5a2a2f; }
  .chip[data-s=withdrawn]    { color: var(--dim); text-decoration: line-through; }
  .flag { font-size: 11px; font-weight: 700; margin-left: 6px; }
  .flag.stale { color: var(--amber); }
  .flag.ghosted { color: var(--red); }
  .flag.archived { color: var(--dim); }
  .meta { color: var(--dim); font-size: 12.5px; }
  .prop-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .prop-actions { display: flex; gap: 8px; margin-top: 4px; }
  .candidates button { display: block; width: 100%; text-align: left; margin: 4px 0; }
  .funnel-row { display: grid; grid-template-columns: 110px 1fr 90px; gap: 10px; align-items: center; padding: 3px 0; }
  .funnel-bar { background: var(--surface2); border-radius: 6px; height: 18px; overflow: hidden; }
  .funnel-bar > div { background: var(--accent); height: 100%; border-radius: 6px; min-width: 2px; }
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--accent); border-radius: 10px;
    padding: 10px 18px; opacity: 0; transition: opacity .3s; pointer-events: none; max-width: 80vw;
  }
  #toast.show { opacity: 1; }
  .controls { display: flex; gap: 14px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .err { color: var(--red); }
  @media (max-width: 720px) {
    body { grid-template-columns: 1fr; }
    nav { position: static; height: auto; flex-direction: row; align-items: center; overflow-x: auto; }
    .brand { padding: 0 10px 0 0; }
    .nav-foot { display: none; }
  }
</style>
</head>
<body>
<nav>
  <div class="brand">Appl<span>yr</span></div>
  <a href="#/dashboard" data-view="dashboard">Dashboard</a>
  <a href="#/applications" data-view="applications">Applications</a>
  <a href="#/review" data-view="review">Review <span class="badge" id="rev-badge"></span></a>
  <a href="#/stats" data-view="stats">Stats</a>
  <div class="nav-foot">local only — nothing leaves this machine</div>
</nav>
<main>
  <form class="saybar" id="say-form">
    <input id="say-input" placeholder='Tell Applyr something… e.g. "phone screen with Stripe went well"' autocomplete="off">
    <button class="primary" type="submit">Say</button>
  </form>
  <div id="say-out"></div>
  <div id="view"></div>
</main>
<div id="toast"></div>

<script>
"use strict";
const $view = document.getElementById("view");
const $sayOut = document.getElementById("say-out");
const STATUSES = ["saved","applying","applied","screening","assessment","interviewing","final_round","offer","accepted","rejected","withdrawn"];

// --- tiny helpers (DOM only; all dynamic text goes through textContent) ---
function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text !== undefined && text !== null) n.textContent = String(text);
  return n;
}
function fmt(s) { return s ? String(s).replace("T", " ").slice(0, 16) : "-"; }
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._h);
  toast._h = setTimeout(() => t.classList.remove("show"), 3500);
}
async function apiGet(path) {
  const r = await fetch(path);
  return r.json();
}
async function apiPost(path, body) {
  const r = await fetch(path, {
    method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
  });
  return r.json();
}
const dispatch = (name, args) => apiPost("/api/dispatch", { name, args });

// --- review badge ---
async function refreshBadge() {
  const res = await dispatch("list_proposals", { status: "pending" });
  const n = ((res.data || {}).proposals || []).length;
  const b = document.getElementById("rev-badge");
  b.textContent = n;
  b.style.display = n ? "inline-block" : "none";
  return n;
}

// --- shared ToolResult renderer (say results, disambiguation, proposals) ---
function renderResult(res, box, retry) {
  box.replaceChildren();
  const card = el("div", "card");
  box.appendChild(card);

  if (res.result === "error") {
    card.appendChild(el("div", "err", res.message || "error"));
    return;
  }
  if (res.reply) {  // plain-text reply from say
    card.appendChild(el("div", null, res.reply));
    return;
  }
  if (res.result === "needs_disambiguation") {
    card.appendChild(el("div", null, res.message || "Which one?"));
    const list = el("div", "candidates");
    for (const c of res.candidates || []) {
      const extra = [c.status, c.last_activity ? "last activity " + c.last_activity : null]
        .filter(Boolean).join(" · ");
      const b = el("button", null, `${c.label}  [${c.ref}]` + (extra ? `  (${extra})` : ""));
      b.onclick = async () => {
        if (!retry) return;
        const param = (res.data || {}).disambiguate_param || "ref";
        const args = Object.assign({}, retry.args, { [param]: c.ref });
        renderResult(await dispatch(retry.name, args), box, { name: retry.name, args });
      };
      list.appendChild(b);
    }
    card.appendChild(list);
    return;
  }
  if (res.result === "proposal_created" && res.proposal) {
    const p = res.proposal;
    const head = el("div", "prop-head");
    head.appendChild(el("strong", null, `proposal #${p.id} — ${p.kind}`));
    card.appendChild(head);
    const diff = el("pre", "diff", p.diff);
    card.appendChild(diff);
    const actions = el("div", "prop-actions");
    const ok = el("button", "primary", "Confirm");
    const no = el("button", "danger", "Reject");
    ok.onclick = async () => {
      const r = await dispatch("confirm_proposal", { proposal_id: p.id });
      if (r.result === "ok") { toast(r.message || "committed"); box.replaceChildren(); }
      else renderResult(r, box);
      refreshBadge(); route();
    };
    no.onclick = async () => {
      await dispatch("reject_proposal", { proposal_id: p.id });
      toast("rejected"); box.replaceChildren(); refreshBadge();
    };
    actions.append(ok, no);
    card.appendChild(actions);
    return;
  }
  // plain ok with data (search hits, briefing, show...)
  if (res.message) card.appendChild(el("div", "meta", res.message));
  if (res.data) {
    const pre = el("pre", "diff", JSON.stringify(res.data, null, 2));
    card.appendChild(pre);
  } else if (!res.message) {
    card.appendChild(el("div", "meta", "ok"));
  }
}

// --- say bar ---
document.getElementById("say-form").onsubmit = async (e) => {
  e.preventDefault();
  const input = document.getElementById("say-input");
  const text = input.value.trim();
  if (!text) return;
  $sayOut.replaceChildren(el("div", "card empty", "thinking…"));
  const res = await apiPost("/api/say", { text });
  renderResult(res, $sayOut, res.tool ? { name: res.tool, args: res.args || {} } : null);
  input.select();
  refreshBadge();
};

// --- views ---
async function viewDashboard() {
  const data = await apiGet("/api/overview");
  const b = data.briefing || {};
  $view.replaceChildren();
  const grid = el("div", "cards");
  $view.appendChild(grid);

  const mk = (title) => {
    const c = el("div", "card");
    c.appendChild(el("h3", null, title));
    grid.appendChild(c);
    return c;
  };

  const iv = mk("Interviews next 48h");
  if ((b.interviews_next_48h || []).length) {
    const ul = el("ul");
    for (const i of b.interviews_next_48h)
      ul.appendChild(el("li", null, `${fmt(i.scheduled_at)} — ${i.label} (round ${i.round}, ${i.format})`));
    iv.appendChild(ul);
  } else iv.appendChild(el("div", "empty", "none scheduled"));

  const td = mk("Tasks due");
  if ((b.tasks_due || []).length) {
    const ul = el("ul");
    for (const t of b.tasks_due) {
      const li = el("li");
      if (t.overdue) li.appendChild(el("strong", "err", "OVERDUE "));
      li.appendChild(document.createTextNode(`${fmt(t.due_at)} — ${t.description}` + (t.app_label ? ` (${t.app_label})` : "")));
      ul.appendChild(li);
    }
    td.appendChild(ul);
  } else td.appendChild(el("div", "empty", "nothing due"));

  const st = mk("Past SLA");
  if ((b.stale || []).length) {
    const ul = el("ul");
    for (const s of b.stale) ul.appendChild(el("li", null, `${s.label} — ${s.status}, quiet ${s.days_quiet}d`));
    st.appendChild(ul);
  } else st.appendChild(el("div", "empty", "all fresh"));

  const pp = mk("Pending proposals");
  const n = (b.pending_proposals || []).length;
  if (n) {
    const ul = el("ul");
    for (const p of b.pending_proposals) ul.appendChild(el("li", null, `${p.kind} (${p.source}) ${p.summary || ""}`));
    pp.appendChild(ul);
    const go = el("button", "primary", `Review ${n} →`);
    go.style.marginTop = "8px";
    go.onclick = () => location.hash = "#/review";
    pp.appendChild(go);
  } else pp.appendChild(el("div", "empty", "queue is clear"));

  const stages = (data.funnel || []).filter(s => s.reached > 0);
  if (stages.length) {
    $view.appendChild(el("h2", null, "Funnel"));
    const card = el("div", "card");
    const max = Math.max(...stages.map(s => s.reached));
    for (const s of stages) {
      const row = el("div", "funnel-row");
      row.appendChild(el("span", null, s.stage));
      const bar = el("div", "funnel-bar");
      const fill = el("div");
      fill.style.width = (100 * s.reached / max) + "%";
      bar.appendChild(fill);
      row.appendChild(bar);
      row.appendChild(el("span", "meta", `${s.reached} reached` +
        (s.conversion !== null && s.conversion !== undefined ? ` · ${Math.round(s.conversion * 100)}%` : "")));
      card.appendChild(row);
    }
    $view.appendChild(card);
  }
}

async function viewApplications() {
  $view.replaceChildren();
  const controls = el("div", "controls");
  const sel = el("select");
  sel.appendChild(new Option("all statuses", ""));
  for (const s of STATUSES) sel.appendChild(new Option(s, s));
  const lbl = el("label");
  const chk = el("input");
  chk.type = "checkbox";
  lbl.append(chk, " include archived");
  controls.append(sel, lbl);
  $view.appendChild(controls);
  const tblBox = el("div");
  const detail = el("div");
  $view.append(tblBox, detail);

  async function load() {
    const rows = await apiGet("/api/applications" + (chk.checked ? "?archived=1" : ""));
    const filtered = sel.value ? rows.filter(r => r.status === sel.value) : rows;
    tblBox.replaceChildren();
    if (!filtered.length) {
      tblBox.appendChild(el("div", "card empty", "no applications" + (sel.value ? ` with status ${sel.value}` : "") +
        ' — capture one with the box above, e.g. "applied to the Stripe backend role"'));
      return;
    }
    const table = el("table");
    const thead = el("thead");
    const hr = el("tr");
    for (const h of ["Ref", "Application", "Status", "In stage", "Quiet", "Source"]) hr.appendChild(el("th", null, h));
    thead.appendChild(hr);
    table.appendChild(thead);
    const tbody = el("tbody");
    for (const r of filtered) {
      const tr = el("tr", "rowlink");
      tr.appendChild(el("td", null, r.ref));
      const tdApp = el("td", null, r.label);
      if (r.ghosted) tdApp.appendChild(el("span", "flag ghosted", "ghosted"));
      else if (r.stale) tdApp.appendChild(el("span", "flag stale", "stale"));
      if (r.archived) tdApp.appendChild(el("span", "flag archived", "archived"));
      tr.appendChild(tdApp);
      const tdS = el("td");
      const chip = el("span", "chip", r.status || "-");
      chip.dataset.s = r.status || "";
      tdS.appendChild(chip);
      tr.appendChild(tdS);
      tr.appendChild(el("td", null, r.days_in_stage !== null ? r.days_in_stage + "d" : "-"));
      tr.appendChild(el("td", null, r.days_quiet !== null ? r.days_quiet + "d" : "-"));
      tr.appendChild(el("td", null, r.source || "-"));
      tr.onclick = () => showDetail(r.ref);
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    const card = el("div", "card");
    card.style.overflowX = "auto";
    card.appendChild(table);
    tblBox.replaceChildren(card);
  }

  async function showDetail(ref) {
    const res = await dispatch("show", { ref });
    detail.replaceChildren();
    if (res.result !== "ok") { renderResult(res, detail); return; }
    const d = res.data;
    const card = el("div", "card");
    const head = el("div", "prop-head");
    head.appendChild(el("strong", null, `${d.company} — ${d.title}  [${d.ref}]`));
    const chip = el("span", "chip", d.status || "-");
    chip.dataset.s = d.status || "";
    head.appendChild(chip);
    card.appendChild(head);
    card.appendChild(el("div", "meta",
      `applied: ${d.applied_at || "-"} · source: ${d.source || "-"} · resume: ${d.resume || "-"}` +
      ` · JD archived: ${d.jd_archived ? "yes" : "no"} · linked emails: ${d.linked_emails ?? 0}`));
    if ((d.events || []).length) {
      const table = el("table");
      const hr = el("tr");
      for (const h of ["When (UTC)", "Type", "Change", "Source", "Note"]) hr.appendChild(el("th", null, h));
      table.appendChild(hr);
      for (const ev of d.events) {
        const tr = el("tr");
        tr.appendChild(el("td", null, fmt(ev.occurred_at)));
        tr.appendChild(el("td", null, ev.type));
        tr.appendChild(el("td", null, ev.type === "status_change" ? `${ev.from || "·"} → ${ev.to}` : ""));
        tr.appendChild(el("td", null, ev.source));
        tr.appendChild(el("td", null, ev.note || ""));
        table.appendChild(tr);
      }
      card.appendChild(el("h2", null, "Timeline"));
      card.appendChild(table);
    }
    if ((d.interviews || []).length) {
      card.appendChild(el("h2", null, "Interviews"));
      const ul = el("ul");
      for (const iv of d.interviews)
        ul.appendChild(el("li", null, `${iv.ref}: round ${iv.round} ${iv.format} @ ${fmt(iv.scheduled_at)}` +
          (iv.outcome ? ` — ${iv.outcome}` : "")));
      card.appendChild(ul);
    }
    if ((d.notes || []).length) {
      card.appendChild(el("h2", null, "Notes"));
      const ul = el("ul");
      for (const n of d.notes) ul.appendChild(el("li", null, `${fmt(n.at)}: ${n.text}`));
      card.appendChild(ul);
    }
    detail.appendChild(card);
    card.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  sel.onchange = load;
  chk.onchange = load;
  await load();
}

async function viewReview() {
  $view.replaceChildren();
  const res = await dispatch("list_proposals", { status: "pending" });
  const proposals = ((res.data || {}).proposals || []);
  if (!proposals.length) {
    $view.appendChild(el("div", "card empty", "no pending proposals — email ingestion and captures land here"));
    return;
  }
  for (const p of proposals) {
    const card = el("div", "card");
    const head = el("div", "prop-head");
    head.appendChild(el("strong", null, `proposal #${p.id} — ${p.kind}`));
    head.appendChild(el("span", "meta", `${p.source} · ${p.created_at}`));
    card.appendChild(head);
    if (p.utterance) card.appendChild(el("div", "meta", `“${p.utterance}”`));
    card.appendChild(el("pre", "diff", p.diff || ""));
    const actions = el("div", "prop-actions");
    const ok = el("button", "primary", "Confirm");
    const no = el("button", "danger", "Reject");
    ok.onclick = async () => {
      const r = await dispatch("confirm_proposal", { proposal_id: p.id });
      if (r.result === "ok") toast(r.message || "committed");
      else toast(r.message || "commit failed");
      refreshBadge(); viewReview();
    };
    no.onclick = async () => {
      await dispatch("reject_proposal", { proposal_id: p.id });
      toast("rejected"); refreshBadge(); viewReview();
    };
    actions.append(ok, no);
    card.appendChild(actions);
    $view.appendChild(card);
  }
}

async function viewStats() {
  const data = await apiGet("/api/stats");
  $view.replaceChildren();

  const stages = (data.funnel || []).filter(s => s.reached > 0);
  $view.appendChild(el("h2", null, "Funnel"));
  if (stages.length) {
    const card = el("div", "card");
    const table = el("table");
    const hr = el("tr");
    for (const h of ["Stage", "Reached", "Progressed", "Conversion", "Median days"]) hr.appendChild(el("th", null, h));
    table.appendChild(hr);
    for (const s of stages) {
      const tr = el("tr");
      tr.appendChild(el("td", null, s.stage));
      tr.appendChild(el("td", null, s.reached));
      tr.appendChild(el("td", null, s.progressed));
      tr.appendChild(el("td", null, s.conversion !== null && s.conversion !== undefined ? Math.round(s.conversion * 100) + "%" : "-"));
      tr.appendChild(el("td", null, s.median_days_to_next ?? "-"));
      table.appendChild(tr);
    }
    card.appendChild(table);
    $view.appendChild(card);
  } else $view.appendChild(el("div", "card empty", "nothing in the funnel yet"));

  const rateTable = (title, rows) => {
    $view.appendChild(el("h2", null, title));
    if (!(rows || []).length) { $view.appendChild(el("div", "card empty", "no applied applications yet")); return; }
    const card = el("div", "card");
    const table = el("table");
    const hr = el("tr");
    for (const h of ["Group", "Apps", "Responses", "Resp %", "Positive", "Pos %"]) hr.appendChild(el("th", null, h));
    table.appendChild(hr);
    for (const r of rows) {
      const tr = el("tr");
      tr.appendChild(el("td", null, r.label));
      tr.appendChild(el("td", null, r.applications));
      tr.appendChild(el("td", null, r.responses));
      tr.appendChild(el("td", null, Math.round(r.response_rate * 100) + "%"));
      tr.appendChild(el("td", null, r.positive));
      tr.appendChild(el("td", null, Math.round(r.positive_rate * 100) + "%"));
      table.appendChild(tr);
    }
    card.appendChild(table);
    $view.appendChild(card);
  };
  rateTable("Response rate by resume version", data.by_resume);
  rateTable("Response rate by source", data.by_source);
  rateTable("Response rate by time-to-apply", data.by_time_to_apply);
}

// --- router ---
const VIEWS = { dashboard: viewDashboard, applications: viewApplications, review: viewReview, stats: viewStats };
function route() {
  const name = (location.hash.replace("#/", "") || "dashboard");
  const fn = VIEWS[name] || viewDashboard;
  for (const a of document.querySelectorAll("nav a"))
    a.classList.toggle("active", a.dataset.view === name);
  fn();
}
window.addEventListener("hashchange", route);
route();
refreshBadge();
</script>
