[project]
name = "jobtrack"
version = "0.1.0"
description = "Local-first, single-user job application tracker with LLM capture and email ingestion"
requires-python = ">=3.12"
dependencies = [
    "sqlmodel>=0.0.24",
    "alembic>=1.13",
    "pydantic>=2.7",
    "fastmcp>=2.3",
    "typer>=0.12",
    "rich>=13.7",
    "httpx>=0.27",
    "sqlite-vec>=0.1.6",
    "rapidfuzz>=3.9",
    "keyring>=25",
    "imap-tools>=1.7",
    "markdownify>=0.13",
    "pypdf>=4.2",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.40"]

[dependency-groups]
dev = ["pytest>=8.2", "ruff>=0.6", "mypy>=1.11"]

[project.scripts]
jobtrack = "jobtrack.cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jobtrack"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
src = ["src", "tests"]
# Alembic revision files are autogenerated; don't lint their formatting.
extend-exclude = ["src/jobtrack/migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
# str+Enum is a deliberate choice (values are stored as plain strings and we
# rely on member == "value" comparisons); StrEnum would change __str__.
ignore = ["UP042"]

[tool.ruff.lint.flake8-bugbear]
# Typer's function-call defaults are the intended API, not a B008 mutable default.
extend-immutable-calls = ["typer.Argument", "typer.Option"]

[tool.mypy]
strict = true
files = ["src"]
mypy_path = "src"
# Alembic revision files are autogenerated boilerplate with dynamic sqlmodel types.
exclude = ["src/jobtrack/migrations/versions/"]

[[tool.mypy.overrides]]
module = [
    "markdownify",
    "sqlite_vec",
    "imap_tools",
    "imap_tools.*",
    "keyring",
    "keyring.*",
    "anthropic",  # optional extra; not installed in the default env
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# keyring's get/set_password are untyped in its stubs; we wrap them thinly.
module = ["jobtrack.ingest.imap_poller"]
disallow_untyped_calls = false
